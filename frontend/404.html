<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetFlow | Page Not Found</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="error-page">
    <div class="page-error-shell">
        <div class="error-card">
            <div class="error-icon">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
            <h1>404</h1>
            <p>Page not found. The link you followed may be broken or the page has been moved.</p>
            <div class="error-actions">
                <a href="index.html" class="primary-btn">Return to Dashboard</a>
                <a href="assets.html" class="secondary-btn">View Assets</a>
            </div>
        </div>
    </div>
</body>
</html>
