<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetFlow | Reports</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body data-page="reports">
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-mark">AF</div>
                <div>
                    <h1>AssetFlow</h1>
                    <p>Analytics suite</p>
                </div>
            </div>
            <nav class="nav-links">
                <a class="nav-link" href="index.html">
                    <i class="fa-solid fa-house"></i>
                    <span>Dashboard</span>
                </a>
                <a class="nav-link" href="assets.html">
                    <i class="fa-solid fa-box"></i>
                    <span>Assets</span>
                </a>
                <a class="nav-link" href="employees.html">
                    <i class="fa-solid fa-users"></i>
                    <span>Employees</span>
                </a>
                <a class="nav-link active" href="reports.html">
                    <i class="fa-solid fa-chart-column"></i>
                    <span>Reports</span>
                </a>
            </nav>
        </aside>
        <div class="content-area">
            <header class="topbar">
                <button class="menu-toggle" aria-label="Toggle menu">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <form class="top-search" onsubmit="return false;">
                    <input type="search" placeholder="Search reports, categories, status..." id="reportSearch">
                    <button><i class="fa-solid fa-magnifying-glass"></i></button>
                </form>
                <div class="top-actions">
                    <button class="icon-btn" aria-label="Notifications">
                        <i class="fa-regular fa-bell"></i>
                        <span class="badge">0</span>
                    </button>
                    <button class="profile-btn" aria-label="Profile">
                        <span class="avatar">AF</span>
                        <div>
                            <span>Admin</span>
                            <small>Operations</small>
                        </div>
                    </button>
                </div>
            </header>
            <main class="page-content">
                <section class="page-header">
                    <div>
                        <p class="eyebrow">Performance insights</p>
                        <h2>Reports</h2>
                    </div>
                    <nav class="breadcrumbs">
                        <a href="index.html">Home</a>
                        <span>Reports</span>
                    </nav>
                </section>
                <section class="stats-grid">
                    <article class="glass-card">
                        <p>Total Assets</p>
                        <h3 id="reportAssetTotal">0</h3>
                    </article>
                    <article class="glass-card">
                        <p>Available</p>
                        <h3 id="reportAssetAvailable">0</h3>
                    </article>
                    <article class="glass-card">
                        <p>Assigned</p>
                        <h3 id="reportAssetAssigned">0</h3>
                    </article>
                    <article class="glass-card">
                        <p>Employees</p>
                        <h3 id="reportEmployeeTotal">0</h3>
                    </article>
                </section>
                <section class="table-toolbar">
                    <div class="toolbar-group stretch">
                        <input type="search" placeholder="Filter summaries..." id="reportFilterSearch">
                        <select id="reportCategoryFilter">
                            <option value="all">All Categories</option>
                        </select>
                    </div>
                </section>
                <section class="reports-grid">
                    <article class="glass-card chart-card">
                        <div class="panel-header">
                            <h3>Asset Status Breakdown</h3>
                        </div>
                        <canvas id="statusPieChart" aria-label="Asset status pie chart"></canvas>
                    </article>
                    <article class="glass-card chart-card">
                        <div class="panel-header">
                            <h3>Category Distribution</h3>
                        </div>
                        <canvas id="categoryBarChart" aria-label="Asset category bar chart"></canvas>
                    </article>
                </section>
                <section class="report-details">
                    <article class="glass-card detail-card">
                        <h3>Asset Status Summary</h3>
                        <ul id="statusSummaryList"></ul>
                    </article>
                    <article class="glass-card detail-card">
                        <h3>Category Summary</h3>
                        <ul id="categorySummaryList"></ul>
                    </article>
                </section>
            </main>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <div class="loading-overlay hidden" id="loadingOverlay">
        <div class="loader"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js" integrity="sha512-IKnqszelJwYuY6Q1Bek6KJ3HtvG5kEZLJ0mh8gJbkElmr5nSBGCp++jGVGlme7x6W7d62uuX3/jI+U72on9x8Q==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="script.js"></script>
</body>
</html>
