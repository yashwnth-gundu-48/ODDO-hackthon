<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetFlow | Assets</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body data-page="assets">
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-mark">AF</div>
                <div>
                    <h1>AssetFlow</h1>
                    <p>Asset management</p>
                </div>
            </div>
            <nav class="nav-links">
                <a class="nav-link" href="index.html">
                    <i class="fa-solid fa-house"></i>
                    <span>Dashboard</span>
                </a>
                <a class="nav-link active" href="assets.html">
                    <i class="fa-solid fa-box"></i>
                    <span>Assets</span>
                </a>
                <a class="nav-link" href="employees.html">
                    <i class="fa-solid fa-users"></i>
                    <span>Employees</span>
                </a>
                <a class="nav-link" href="reports.html">
                    <i class="fa-solid fa-chart-column"></i>
                    <span>Reports</span>
                </a>
            </nav>
        </aside>
        <div class="content-area">
            <header class="topbar">
                <button class="menu-toggle" aria-label="Toggle menu">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <form class="top-search" onsubmit="return false;">
                    <input type="search" placeholder="Search assets by name or ID..." id="assetSearch">
                    <button><i class="fa-solid fa-magnifying-glass"></i></button>
                </form>
                <div class="top-actions">
                    <button class="icon-btn" aria-label="Notifications">
                        <i class="fa-regular fa-bell"></i>
                        <span class="badge">2</span>
                    </button>
                    <button class="profile-btn" aria-label="Profile">
                        <span class="avatar">AF</span>
                        <div>
                            <span>Admin</span>
                            <small>Operations</small>
                        </div>
                    </button>
                </div>
            </header>
            <main class="page-content">
                <section class="page-header">
                    <div>
                        <p class="eyebrow">Assets Catalog</p>
                        <h2>Assets</h2>
                    </div>
                    <nav class="breadcrumbs">
                        <a href="index.html">Home</a>
                        <span>Assets</span>
                    </nav>
                </section>
                <section class="stats-grid small-grid">
                    <article class="glass-card">
                        <p>Total Assets</p>
                        <h3 id="assetTotalCount">0</h3>
                    </article>
                    <article class="glass-card">
                        <p>Available</p>
                        <h3 id="assetAvailableCount">0</h3>
                    </article>
                    <article class="glass-card">
                        <p>Assigned</p>
                        <h3 id="assetAssignedCount">0</h3>
                    </article>
                </section>
                <section class="table-toolbar">
                    <div class="toolbar-group">
                        <button class="primary-btn" id="openAssetModalBtn">
                            <i class="fa-solid fa-plus"></i>
                            New Asset
                        </button>
                        <button class="secondary-btn" id="toggleAssetViewBtn">
                            <i class="fa-solid fa-table-list"></i>
                            Toggle View
                        </button>
                    </div>
                    <div class="toolbar-group">
                        <select id="assetCategoryFilter">
                            <option value="all">All Categories</option>
                        </select>
                        <select id="assetStatusFilter">
                            <option value="all">All Status</option>
                            <option value="Available">Available</option>
                            <option value="Assigned">Assigned</option>
                            <option value="In Repair">In Repair</option>
                        </select>
                    </div>
                </section>
                <section class="asset-content">
                    <div class="asset-table-wrap" id="assetTableWrap"></div>
                    <div class="asset-cards-wrap hidden" id="assetCardsWrap"></div>
                </section>
            </main>
        </div>
    </div>

    <div class="modal-overlay hidden" id="assetModalOverlay">
        <div class="modal-card">
            <div class="modal-header">
                <div>
                    <h3 id="assetModalTitle">Add New Asset</h3>
                    <p>Manage the asset details and status.</p>
                </div>
                <button class="icon-btn close-modal" aria-label="Close asset modal">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <form id="assetForm">
                <div class="form-grid">
                    <label>
                        Asset Name
                        <input type="text" name="name" required>
                    </label>
                    <label>
                        Asset ID
                        <input type="text" name="id" required>
                    </label>
                    <label>
                        Category
                        <input type="text" name="category" required>
                    </label>
                    <label>
                        Serial Number
                        <input type="text" name="serial" required>
                    </label>
                    <label>
                        Purchase Date
                        <input type="date" name="purchaseDate" required>
                    </label>
                    <label>
                        Location
                        <input type="text" name="location" required>
                    </label>
                    <label>
                        Condition
                        <select name="condition" required>
                            <option value="Excellent">Excellent</option>
                            <option value="Good">Good</option>
                            <option value="Fair">Fair</option>
                            <option value="Needs Repair">Needs Repair</option>
                        </select>
                    </label>
                    <label>
                        Status
                        <select name="status" required>
                            <option value="Available">Available</option>
                            <option value="Assigned">Assigned</option>
                            <option value="In Repair">In Repair</option>
                        </select>
                    </label>
                </div>
                <div class="modal-actions">
                    <button type="button" class="secondary-btn close-modal">Cancel</button>
                    <button type="submit" class="primary-btn">Save Asset</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <div class="loading-overlay hidden" id="loadingOverlay">
        <div class="loader"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js" integrity="sha512-IKnqszelJwYuY6Q1Bek6KJ3HtvG5kEZLJ0mh8gJbkElmr5nSBGCp++jGVGlme7x6W7d62uuX3/jI+U72on9x8Q==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="script.js"></script>
</body>
</html>
